name: Update The Draft Ledger

# Runs in the cloud on GitHub's servers (no laptop needed). Fetches prices,
# recomputes standings, and publishes — but only commits when data changed.
# Times are UTC. July 2026 is EDT (UTC-4); these fire 3x per trading day.
# Each slot fires twice (a burst) because GitHub's scheduler is often late/drops runs;
# idempotent writes make the extra run a harmless no-op.
on:
  schedule:
    - cron: "40,55 13 * * 1-5"   # ~9:40 ET — market open (after the opening print)
    - cron: "30,45 16 * * 1-5"   # ~12:30 ET — midday
    - cron: "15,35 20 * * 1-5"   # ~4:15 ET — after close (locks the day's history point)
  workflow_dispatch: {}          # lets you trigger a run by hand anytime

permissions:
  contents: write                # allow the run to push the rebuilt site back to the repo

concurrency:
  group: ledger-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (yfinance fallback + Pillow for cards)
        run: python -m pip install --quiet yfinance pillow
      - name: Configure git identity
        run: |
          git config user.name "ledger-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Fetch, recompute, publish if changed
        run: bash scripts/update.sh
